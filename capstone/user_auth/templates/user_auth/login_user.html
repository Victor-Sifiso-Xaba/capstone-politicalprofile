{% extends 'user_auth/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
  <h2>Login</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Login</button>
  </form>
  <p>Not registered to Polls? <a href="{% url 'user_auth:register_user' %}">Register</a></p>
{% endblock %}
