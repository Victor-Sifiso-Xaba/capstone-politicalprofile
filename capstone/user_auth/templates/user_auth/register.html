{% extends 'user_auth/base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
  <h2>Register</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Register</button>
  </form>
  <p>Already have registered? <a href="{% url 'user_auth:login_user' %}">Login</a></p>
{% endblock %}
